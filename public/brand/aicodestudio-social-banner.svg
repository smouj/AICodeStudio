<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <!-- AICodeStudio Social Banner -->
  <!-- Background -->
  <rect width="1280" height="640" fill="#080c12"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,212,170,0.03)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Left: Logo mark -->
  <g transform="translate(120, 200)">
    <path d="M60 40 L20 120 L60 200" stroke="#00d4aa" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M180 40 L220 120 L180 200" stroke="#00d4aa" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="160" y1="30" x2="80" y2="210" stroke="#00d4aa" stroke-width="14" stroke-linecap="round"/>
    <circle cx="120" cy="236" r="4" fill="#00d4aa" opacity="0.5"/>
  </g>

  <!-- Center: Title and tagline -->
  <text x="520" y="260" font-family="monospace" font-size="64" font-weight="700" fill="#e6edf3" letter-spacing="-2">AICodeStudio</text>
  <text x="520" y="310" font-family="monospace" font-size="24" fill="#6e7681">AI-native workspace for code agents</text>

  <!-- Bottom: Feature chips -->
  <g transform="translate(520, 360)">
    <!-- Chip: Monaco Editor -->
    <rect x="0" y="0" width="140" height="32" rx="4" fill="rgba(0,212,170,0.08)" stroke="rgba(0,212,170,0.15)" stroke-width="1"/>
    <text x="70" y="21" font-family="monospace" font-size="12" fill="#00d4aa" text-anchor="middle">Monaco Editor</text>

    <!-- Chip: Real AI -->
    <rect x="156" y="0" width="100" height="32" rx="4" fill="rgba(0,212,170,0.08)" stroke="rgba(0,212,170,0.15)" stroke-width="1"/>
    <text x="206" y="21" font-family="monospace" font-size="12" fill="#00d4aa" text-anchor="middle">Real AI</text>

    <!-- Chip: PWA -->
    <rect x="272" y="0" width="80" height="32" rx="4" fill="rgba(0,212,170,0.08)" stroke="rgba(0,212,170,0.15)" stroke-width="1"/>
    <text x="312" y="21" font-family="monospace" font-size="12" fill="#00d4aa" text-anchor="middle">PWA</text>

    <!-- Chip: Open Source -->
    <rect x="368" y="0" width="120" height="32" rx="4" fill="rgba(0,212,170,0.08)" stroke="rgba(0,212,170,0.15)" stroke-width="1"/>
    <text x="428" y="21" font-family="monospace" font-size="12" fill="#00d4aa" text-anchor="middle">Open Source</text>
  </g>

  <!-- Bottom right: URL -->
  <text x="1100" y="580" font-family="monospace" font-size="14" fill="#30363d">github.com/smouj/AICodeStudio</text>

  <!-- Decorative accent line -->
  <line x1="120" y1="560" x2="400" y2="560" stroke="rgba(0,212,170,0.1)" stroke-width="1"/>
</svg>

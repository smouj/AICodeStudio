  <!-- Tagline -->
  <text x="640" y="552" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="12" fill="#ffffff" opacity="0.3">
    OpenClaw · Hermes · GitHub · Monaco Editor
  </text>
  
  <!-- Bottom border accent -->
  <rect x="520" y="580" width="240" height="2" rx="1" fill="#ffffff" opacity="0.2"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050810"/>
      <stop offset="50%" style="stop-color:#080c12"/>
      <stop offset="100%" style="stop-color:#0a0e14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00d4aa;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00d4aa;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.03" stroke="#00d4aa">
    <line x1="0" y1="80" x2="1280" y2="80" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke-width="0.5"/>
    <line x1="0" y1="560" x2="1280" y2="560" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="640" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="640" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="640" stroke-width="0.5"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke-width="0.5"/>
    <line x1="1120" y1="0" x2="1120" y2="640" stroke-width="0.5"/>
  </g>

  <!-- Accent glow line -->
  <rect x="0" y="318" width="1280" height="4" fill="url(#lineGlow)"/>

  <!-- Logo -->
  <g transform="translate(640, 200) scale(0.5)">
    <path d="M195 156 L105 256 L195 356" stroke="#00d4aa" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M317 156 L407 256 L317 356" stroke="#00d4aa" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="290" y1="140" x2="222" y2="372" stroke="#00d4aa" stroke-width="22" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="640" y="380" text-anchor="middle" fill="#e6edf3" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="48" font-weight="700" letter-spacing="-1">AICodeStudio</text>

  <!-- Tagline -->
  <text x="640" y="420" text-anchor="middle" fill="#484f58" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="16">Next-Generation AI-Powered IDE</text>

  <!-- Feature badges -->
  <g transform="translate(390, 470)">
    <rect x="0" y="0" width="100" height="26" rx="13" fill="rgba(0,212,170,0.1)" stroke="#00d4aa" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="50" y="17" text-anchor="middle" fill="#00d4aa" font-family="ui-monospace, monospace" font-size="10" font-weight="600">OpenClaw</text>
  </g>
  <g transform="translate(510, 470)">
    <rect x="0" y="0" width="90" height="26" rx="13" fill="rgba(0,212,170,0.1)" stroke="#00d4aa" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="45" y="17" text-anchor="middle" fill="#00d4aa" font-family="ui-monospace, monospace" font-size="10" font-weight="600">Hermes</text>
  </g>
  <g transform="translate(620, 470)">
    <rect x="0" y="0" width="90" height="26" rx="13" fill="rgba(0,212,170,0.1)" stroke="#00d4aa" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="45" y="17" text-anchor="middle" fill="#00d4aa" font-family="ui-monospace, monospace" font-size="10" font-weight="600">Monaco</text>
  </g>
  <g transform="translate(730, 470)">
    <rect x="0" y="0" width="90" height="26" rx="13" fill="rgba(0,212,170,0.1)" stroke="#00d4aa" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="45" y="17" text-anchor="middle" fill="#00d4aa" font-family="ui-monospace, monospace" font-size="10" font-weight="600">PWA</text>
  </g>

  <!-- Bottom info -->
  <text x="640" y="560" text-anchor="middle" fill="#30363d" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace" font-size="12">Open Source · Installable · AI-First</text>

  <!-- Corner accents -->
  <path d="M0 0 L60 0 L0 60 Z" fill="#00d4aa" opacity="0.05"/>
  <path d="M1280 640 L1220 640 L1280 580 Z" fill="#00d4aa" opacity="0.05"/>
</svg>
